<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects </title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
        
</head>
<body>

    <main>
        <h1 id="courseName"></h1>
        <h2 id="courseCode"></h2>
        <img src="images/js-logo.png" alt="Course Logo">
        <label for="sectionNumber">Section Number</label>
            <input id="sectionNumber" />

        <button id="enrollStudent">Enroll Student</button>

        <table>
            <!-- table header that has the titles-->
            <thead> 
                <!-- table row -->
                <tr>
                    <!-- table header cells -->
                    <th>Section#</th>
                    <th>Room#</th>
                    <th>#Enrolled</th>
                    <th>Days</th>
                    <th>Instructor</th>
                </tr>
            </thead>
            <!-- table body that conatains my data -->
            <tbody id="sections"></tbody>
        </table>

    </main>

          
    
</body>
</html>
